<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/settings.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Overlay — Settings</title>
    <script type="module" src="/src/settings.ts"></script>
  </head>
  <body>
    <h1>⚔ Skill Overlay</h1>

    <section>
      <div class="field">
        <span>Overlay opacity</span>
        <input id="opacity" type="range" min="0.2" max="1" step="0.05" />
        <span id="opacity-val" class="val"></span>
      </div>
    </section>

    <section>
      <h2>Hotkeys</h2>
      <div class="field">
        <span>Toggle overlay</span>
        <button id="hk-toggle" class="hk"></button>
      </div>
      <div class="field">
        <span>Reset rotation</span>
        <button id="hk-reset" class="hk"></button>
      </div>
      <p class="hint">Click a hotkey, then press a combo (include Ctrl, Alt, or Shift). Esc cancels.</p>
    </section>

    <section>
      <h2>Rotation</h2>
      <button id="load" class="primary">Load rotation…</button>
      <p class="rot" id="rot"></p>
    </section>
  </body>
</html>
